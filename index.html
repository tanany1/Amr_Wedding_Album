<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Amr & Ayten | Wedding Album</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Pinyon+Script&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color:      #EFECE4;
      --crimson:       #523B25; 
      --crimson-dark:  #3b2a1a; 
      --gold:          #c9a84c;
      --text:          #523B25; 
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-color);
      color: var(--text);
      text-align: center;
      padding: 20px;
      overflow-x: hidden;
    }

    video.mirrored-preview {
      transform: scaleX(-1);
    }

    h1 {
      font-family: 'Pinyon Script', cursive;
      font-size: 3rem;
      color: var(--crimson);
      margin-bottom: 5px;
    }

    p.subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }

    #camera-container {
      position: relative;
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,.1);
      border: 2px solid rgba(82,59,37,.4);
    }

    video {
      width: 100%;
      display: block;
      background: #000;
    }

    /* Hide the canvas, it's only used to grab the frame */
    #canvas { display: none; }

    #controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .theme-btn {
      background: var(--crimson);
      color: #EFECE4;
      border: none;
      padding: 12px 20px;
      border-radius: 30px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(82,59,37,.3);
      transition: transform .3s, background .3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .theme-btn:hover {
      background: var(--crimson-dark);
      transform: translateY(-2px);
    }

    .secondary-btn {
      background: transparent;
      color: var(--crimson);
      border: 1px solid var(--crimson);
    }
    
    .secondary-btn:hover {
      background: rgba(82,59,37,0.1);
    }

    input[type="file"] {
      display: none;
    }

    #status {
      margin-top: 15px;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 30px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .gallery-item {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(82,59,37,.2);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      animation: fadeIn 0.5s ease forwards;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .upload-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(239, 236, 228, 0.85); /* Matches your var(--bg-color) */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--crimson);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      z-index: 2;
      transition: opacity 0.5s ease;
    }

    .spinner {
      border: 3px solid rgba(82,59,37,.2);
      border-top: 3px solid var(--crimson);
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
      margin-bottom: 8px;
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .limit-reached {
      color: var(--gold);
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: bold;
      margin-top: 20px;
      display: none;
    }

  </style>
</head>
<body>

  <h1>Amr & Ayten</h1>
  <p class="subtitle">Help us capture the magic</p>

  <div id="camera-container">
    <video id="video" autoplay playsinline></video>
  </div>
  <canvas id="canvas"></canvas>

  <div id="controls">
    <button class="theme-btn" id="capture-btn">
      📷 Capture
    </button>
    <button class="theme-btn secondary-btn" id="switch-cam-btn">
      🔄 Flip Cam
    </button>
    
    <label class="theme-btn secondary-btn" style="cursor: pointer;">
      📁 Upload
      <input type="file" id="file-upload" accept="image/*">
    </label>
  </div>

  <p id="status">Images captured: <span id="count-display">0</span> / 10</p>
  <p id="limit-msg" class="limit-reached">Thank you! Your 10 memories are saved.</p>

  <div id="gallery"></div>

  <script>
    // --- CONFIGURATION ---
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz625DjFWJ5uGBvFsLq1EQVmpgQpQ9lMZGAdAsJcqIPyjFCBJm9n5ONCW7COuytdpKPtg/exec'; 
    const MAX_IMAGES = 10;

    // Retrieve previous data from mobile storage
    let imageCount = parseInt(localStorage.getItem('amr_ayten_image_count')) || 0;
    let savedThumbnails = JSON.parse(localStorage.getItem('amr_ayten_thumbnails')) || [];
    let useFrontCamera = false;
    let currentStream = null;

    // --- DOM ELEMENTS ---
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const captureBtn = document.getElementById('capture-btn');
    const switchCamBtn = document.getElementById('switch-cam-btn');
    const fileUpload = document.getElementById('file-upload');
    const controls = document.getElementById('controls');
    const gallery = document.getElementById('gallery');
    const statusText = document.getElementById('status');
    const countDisplay = document.getElementById('count-display');
    const limitMsg = document.getElementById('limit-msg');

    // Run immediately to check structural configuration limits
    updateUI();

    // Render historical thumbnails saved from previous actions
    savedThumbnails.forEach(src => {
      addToGallery(src, true);
    });

    // --- CAMERA INITIALIZATION ---
    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }
      
      const constraints = {
        video: {
          facingMode: useFrontCamera ? "user" : "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        }
      };

      try {
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = currentStream;
      } catch (err) {
        console.error("Error accessing camera: ", err);
        statusText.innerText = "Camera access denied or unavailable.";
      }
    }

    // Only start camera if they haven't reached the limit yet
    if (imageCount < MAX_IMAGES) {
      startCamera();
    }

    // Switch Camera Front/Back
    switchCamBtn.addEventListener('click', () => {
      useFrontCamera = !useFrontCamera;
      
      // Toggle the mirrored CSS class for the live preview
      if (useFrontCamera) {
        video.classList.add('mirrored-preview');
      } else {
        video.classList.remove('mirrored-preview');
      }
      
      startCamera();
    });

    captureBtn.addEventListener('click', () => {
      if (imageCount >= MAX_IMAGES) return;

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      // Flip the context horizontally if the front camera is active
      if (useFrontCamera) {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      
      // Reset the transformation matrix so it doesn't break back-camera captures
      ctx.setTransform(1, 0, 0, 1, 0, 0);

      const imageData = canvas.toDataURL('image/png');
      processImage(imageData);
    });

    // --- HANDLE FILE UPLOAD ---
    fileUpload.addEventListener('change', (e) => {
      if (imageCount >= MAX_IMAGES || !e.target.files[0]) return;

      const file = e.target.files[0];
      const reader = new FileReader();
      
      reader.onload = function(event) {
        processImage(event.target.result);
      };
      
      reader.readAsDataURL(file);
    });

    // --- PROCESS & UPLOAD ---
    function processImage(base64Data) {
      imageCount++;
      localStorage.setItem('amr_ayten_image_count', imageCount); 
      updateUI();
      
      // Live photo rendering gets an active loading overlay
      const overlayElement = addToGallery(base64Data, false);
      
      // Process and save a lightweight thumbnail clone securely to storage
      saveThumbnailToStorage(base64Data);
      
      // Send the beautiful full-res copy straight to Google Drive
      uploadToDrive(base64Data, overlayElement);
    }

    function addToGallery(src, isHistorical = false) {
      const wrapper = document.createElement('div');
      wrapper.className = 'gallery-item';

      const img = document.createElement('img');
      img.src = src;
      wrapper.appendChild(img);

      if (!isHistorical) {
        // Create the active loading UI for live actions
        const overlay = document.createElement('div');
        overlay.className = 'upload-overlay';
        overlay.innerHTML = `
          <div class="spinner"></div>
          <span>Uploading...</span>
        `;
        wrapper.appendChild(overlay);
        gallery.prepend(wrapper); 
        return overlay; 
      } else {
        // If it's loaded from storage cache, bypass overlay requirements
        gallery.prepend(wrapper);
      }
    }

    function saveThumbnailToStorage(base64Data) {
      const img = new Image();
      img.onload = function() {
        const maxDim = 300; // Optimal thumbnail target size
        let width = img.width;
        let height = img.height;
        
        if (width > height) {
          if (width > maxDim) {
            height *= maxDim / width;
            width = maxDim;
          }
        } else {
          if (height > maxDim) {
            width *= maxDim / height;
            height = maxDim;
          }
        }
        
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width = width;
        thumbCanvas.height = height;
        const thumbCtx = thumbCanvas.getContext('2d');
        thumbCtx.drawImage(img, 0, 0, width, height);
        
        // Convert to optimized low-footprint JPEGs
        const thumbBase64 = thumbCanvas.toDataURL('image/jpeg', 0.7);
        
        savedThumbnails.push(thumbBase64);
        localStorage.setItem('amr_ayten_thumbnails', JSON.stringify(savedThumbnails));
      };
      img.src = base64Data;
    }

    function updateUI() {
      countDisplay.innerText = imageCount;
      
      if (imageCount >= MAX_IMAGES) {
        controls.style.display = 'none'; 
        document.getElementById('camera-container').style.display = 'none'; 
        limitMsg.style.display = 'block';
        statusText.style.display = 'none';
        
        if (currentStream) {
          currentStream.getTracks().forEach(track => track.stop());
        }
      }
    }

    function uploadToDrive(base64Data, overlay) {
      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify({
          image: base64Data,
          filename: `Amr_Ayten_${Date.now()}.png`
        })
      })
      .then(response => response.json())
      .then(data => {
        console.log("Upload successful", data);
        overlay.innerHTML = '<span>✔️ Saved</span>';
        setTimeout(() => {
            overlay.style.opacity = '0';
        }, 1500);
      })
      .catch(error => {
        console.error("Upload failed", error);
        overlay.innerHTML = '<span style="color: darkred;">❌ Failed</span>';
      });
    }
  </script>
</body>
</html>
